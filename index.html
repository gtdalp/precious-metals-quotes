<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贵金属行情中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #9ca3af;
            font-size: 1.1em;
        }

        .last-update {
            color: #10b981;
            font-size: 0.9em;
            margin-top: 10px;
        }

        .section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .section-title {
            font-size: 1.5em;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title.precious {
            color: #fbbf24;
        }

        .section-title.stock {
            color: #60a5fa;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 1.2em;
            font-weight: 600;
        }

        .card-symbol {
            color: #9ca3af;
            font-size: 0.9em;
        }

        .price {
            font-size: 2em;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .price-up {
            color: #10b981;
        }

        .price-down {
            color: #ef4444;
        }

        .change-info {
            display: flex;
            gap: 15px;
            font-size: 0.95em;
        }

        .change {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .change-percent {
            font-weight: 600;
        }

        .arrow {
            font-size: 1.2em;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #9ca3af;
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #fbbf24;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            padding: 15px;
            color: #fca5a5;
            margin-top: 10px;
        }

        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(251, 191, 36, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .refresh-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(251, 191, 36, 0.6);
        }

        .refresh-btn:active {
            transform: scale(0.95);
        }

        .refresh-icon {
            width: 24px;
            height: 24px;
            fill: #1a1a2e;
        }

        .countdown {
            position: fixed;
            bottom: 100px;
            right: 35px;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            color: #9ca3af;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .refresh-btn {
                bottom: 20px;
                right: 20px;
                width: 50px;
                height: 50px;
            }

            .countdown {
                bottom: 80px;
                right: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏆 贵金属行情中心</h1>
            <p class="subtitle">实时追踪全球贵金属与 A 股市场动态</p>
            <p class="last-update" id="lastUpdate">最后更新：--</p>
        </header>

        <main>
            <!-- 贵金属模块 -->
            <section class="section">
                <h2 class="section-title precious">
                    <span>💰</span> 贵金属实时价格
                </h2>
                <div class="grid" id="preciousMetalsGrid">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>正在加载贵金属数据...</p>
                    </div>
                </div>
            </section>

            <!-- A 股大盘指数模块 -->
            <section class="section">
                <h2 class="section-title stock">
                    <span>📊</span> A 股大盘指数
                </h2>
                <div class="grid" id="stockIndexGrid">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>正在加载指数数据...</p>
                    </div>
                </div>
            </section>

            <!-- 贵金属个股模块 -->
            <section class="section">
                <h2 class="section-title stock">
                    <span>📈</span> 贵金属相关个股
                </h2>
                <div class="grid" id="stockGrid">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>正在加载个股数据...</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div class="countdown" id="countdown">下次刷新：5s</div>

    <button class="refresh-btn" id="refreshBtn" title="手动刷新">
        <svg class="refresh-icon" viewBox="0 0 24 24">
            <path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
        </svg>
    </button>

    <script src="app.js"></script>
</body>
</html>
